{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="سایت شخصی حسن برای نمایش پروژه‌ها، مهارت‌ها و مسیر یادگیری توسعه وب با Django.">
    <title>{% block title %}سایت شخصی حسن{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=11">
    {% block extra_head %}{% endblock %}
</head>
<body id="top" class="{% block body_class %}{% endblock %}">
    <div class="dot-field" aria-hidden="true"></div>
    <div class="cursor-light" aria-hidden="true"></div>

    <header class="site-header">
        <div class="container nav-container">
            <a class="brand" href="{% url 'core:home' %}" aria-label="صفحه اصلی">
                <img src="{% static 'images/hir-logo-transparent.png' %}" alt="HIR Logo" class="brand-logo">
            </a>

            <nav class="main-nav" aria-label="ناوبری اصلی">
                <a href="{% url 'core:home' %}">خانه</a>
                <a href="{% url 'core:about' %}">درباره من</a>
                <a href="{% url 'portfolio:project_list' %}">پروژه‌ها</a>
                <a href="#contact">تماس</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer" id="contact">
        <div class="container footer-layout">
            <div class="footer-brand-box">
                <img src="{% static 'images/hir-logo-transparent.png' %}" alt="HIR Logo" class="footer-logo">

            </div>

            <div class="footer-links">
                <h3>دسترسی سریع</h3>
                <a href="{% url 'core:home' %}">خانه</a>
                <a href="{% url 'core:about' %}">درباره من</a>
                <a href="{% url 'portfolio:project_list' %}">پروژه‌ها</a>
            </div>

            <div class="footer-contact">
                <h3>ارتباط</h3>
                <p>
                    <a href="https://t.me/H3N_WLF" target="_blank" rel="noopener" aria-label="تلگرام">تلگرام</a>
                </p>
                <div class="footer-tags">
                    <span>Django</span>
                    <span>Python</span>
                    <span>PostgreSQL</span>
                </div>
            </div>
        </div>

    </footer>

    <button class="scroll-top" type="button" aria-label="بازگشت به بالای صفحه">↑</button>
    <script src="{% static 'js/interface.js' %}?v=11"></script></body>
</html>
